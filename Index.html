<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Trading Prompts</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d40;
    --accent: #00d4aa;
    --accent2: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --number: #334155;
    --input-bg: #1f2937;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .grid {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    width: 32px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
  }
  .card-subtitle {
    font-size: 12px;
    color: var(--accent2);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 1px;
  }
  .input-group {
    margin-bottom: 12px;
    background: #0d1520;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .input-label {
    font-size: 11px;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 6px;
    display: block;
  }
  .custom-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #fff;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    outline: none;
  }
  .custom-input:focus { border-color: var(--accent); }
  .prompt-box {
    background: #0d1520;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    position: relative;
  }
  .prompt-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .prompt-text .bracket {
    color: var(--accent);
    font-weight: 600;
    background: rgba(0, 212, 170, 0.1);
    padding: 1px 4px;
    border-radius: 3px;
  }
  .action-bar {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .copy-btn {
    background: var(--border);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 6px;
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    text-align: center;
  }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied { background: #22c55e !important; color: #fff !important; }
  footer {
    text-align: center;
    margin-top: 32px;
    color: var(--muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <div class="tag">Claude × Trading (Mobile Fixed)</div>
  <h1>7 Prompts สำหรับ<br><span>เทรดอัตโนมัติ</span></h1>
  <p>by @malagojr · RoboRocks</p>
</header>

<div class="grid" id="grid"></div>

<footer>เวอร์ชันแก้ไขปัญหาปุ่มก๊อปปี้บนมือถือเรียบร้อยแล้ว</footer>

<script>
const prompts = [
  {
    num: "01",
    title: "Trade Idea Generator",
    subtitle: "สร้างไอเดียเทรด",
    placeholder: "เช่น หุ้นฮ่องกง 9988.HK หรือกลุ่มธนาคาร",
    paramName: "stock/index/sector",
    text: `Analyze today's market and identify 5 high-probability trade opportunities for [PARAM].\n\nFor each setup, provide:\n- Suggested entry price\n- Profit targets\n- Stop-loss level\n- Expected risk-to-reward ratio\n\nAlso explain the reasoning behind each trade using both technical and fundamental insights.`
  },
  {
    num: "02",
    title: "Automated Technical Analyst",
    subtitle: "วิเคราะห์เทคนิคอัตโนมัติ",
    placeholder: "เช่น 6060.HK, RBLX, KKP",
    paramName: "stock/ticker",
    text: `Evaluate [PARAM] using both daily and weekly timeframes.\n\nIdentify key support and resistance zones, trendlines, moving averages, and momentum indicators.\n\nThen deliver a clear:\n- Buy signal\n- Hold signal\n- Sell signal\n\nwith step-by-step explanation.`
  },
  {
    num: "03",
    title: "News-to-Trade Converter",
    subtitle: "แปลงข่าวเป็นสัญญาณเทรด",
    placeholder: "เช่น Tesla, กลุ่มยานยนต์ไฟฟ้า",
    paramName: "company/sector",
    text: `Summarize the most recent news related to [PARAM] and convert it into actionable trading insights.\n\nOutline:\n- The potential short-term impact\n- The potential long-term impact\n- Expected price movement range\n- Suggested positioning`
  },
  {
    num: "04",
    title: "Strategy Backtester",
    subtitle: "ทดสอบกลยุทธ์ย้อนหลัง",
    placeholder: "กลยุทธ์: Moving Average Crossover / สินทรัพย์: S50U26 / เวลา: 5 ปีย้อนหลัง",
    paramName: "strategy, asset, and time period",
    text: `Backtest the strategy described here: [PARAM].\n\nReport:\n- Win rate\n- Profit factor\n- Maximum drawdown\n\nAnd suggest potential improvements to enhance risk-adjusted returns.`
  },
  {
    num: "05",
    title: "Portfolio Risk Manager",
    subtitle: "จัดการความเสี่ยงพอร์ต",
    placeholder: "เช่น 9988.HK 40%, S50U26 30%, เงินสด 30%",
    paramName: "tickers & allocations",
    text: `Evaluate my portfolio: [PARAM].\n\nIdentify:\n- Areas of overexposure\n- Weak positions\n- Hidden correlations\n\nThen design risk-adjusted rebalancing and hedging strategies designed to withstand a potential 20% market decline.`
  },
  {
    num: "06",
    title: "Trading Journal Analyzer",
    subtitle: "วิเคราะห์ไดอารี่เทรด",
    placeholder: "เช่น ชนะ 12 ไม้จากเบรคเอาท์ แพ้ 8 ไม้จากไล่ราคาไล่ควบฝั่งซื้อ",
    paramName: "trades with entry, exit, and results",
    text: `Analyze my last 20 trades: [PARAM].\n\nIdentify:\n- Recurring errors\n- Missed opportunities\n- Behavioral biases\n\nThen provide 3 personalized rules to improve consistency immediately.`
  },
  {
    num: "07",
    title: "Fully Automated Trade Plan",
    subtitle: "แผนเทรดครบวงจร",
    placeholder: "เช่น ตลาดหุ้นไทย TFEX หรือ หุ้นเทคสหรัฐฯ",
    paramName: "market/asset",
    text: `Create a structured daily trading plan for [PARAM].\n\nInclude:\n- Pre-market scan\n- Opening execution strategy\n- Midday adjustments\n- Closing approach\n\nPresent the plan as a time-stamped checklist I can follow step by step.`
  }
];

const grid = document.getElementById('grid');

prompts.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="num">${p.num}</div>
      <div>
        <div class="card-title">${p.title}</div>
        <div class="card-subtitle">${p.subtitle}</div>
      </div>
    </div>
    <div class="input-group">
      <label class="input-label">ระบุข้อมูลที่ต้องการวิเคราะห์ (${p.paramName}):</label>
      <input type="text" class="custom-input" id="input-${i}" placeholder="${p.placeholder}">
    </div>
    <div class="prompt-box">
      <pre class="prompt-text" id="preview-${i}"></pre>
    </div>
    <div class="action-bar">
      <button class="copy-btn" id="btn-${i}">คัดลอก Prompt นี้</button>
    </div>
  `;
  grid.appendChild(card);

  const inputEl = card.querySelector(`#input-${i}`);
  const previewEl = card.querySelector(`#preview-${i}`);
  const btnEl = card.querySelector(`#btn-${i}`);

  function updatePreview() {
    const val = inputEl.value.trim();
    const replacement = val ? val : `[insert ${p.paramName}]`;
    let dynamicText = p.text.replace('[PARAM]', replacement);
    let highlightedText = p.text.replace('[PARAM]', `<span class="bracket">${replacement}</span>`);
    previewEl.innerHTML = highlightedText;
    return dynamicText;
  }

  inputEl.addEventListener('input', updatePreview);
  const getLatestText = updatePreview;

  btnEl.addEventListener('click', () => {
    const textToCopy = getLatestText();
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(textToCopy).then(() => {
        showSuccess(btnEl);
      }).catch(() => {
        fallbackCopy(textToCopy, btnEl);
      });
    } else {
      fallbackCopy(textToCopy, btnEl);
    }
  });
});

function fallbackCopy(text, button) {
  const textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.top = "0";
  textArea.style.left = "0";
  textArea.style.position = "fixed";
  textArea.style.opacity = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  textArea.setSelectionRange(0, 99999);
  try {
    const successful = document.execCommand('copy');
    if (successful) {
      showSuccess(button);
    } else {
      alert("ไม่สามารถคัดลอกอัตโนมัติได้ กรุณาเลือกคัดลอกข้อความด้วยตนเอง");
    }
  } catch (err) {
    alert("เกิดข้อผิดพลาดในการคัดลอก");
  }
  document.body.removeChild(textArea);
}

function showSuccess(button) {
  const originalText = button.textContent;
  button.textContent = '✓ คัดลอกลงคีย์บอร์ดแล้ว!';
  button.classList.add('copied');
  setTimeout(() => {
    button.textContent = originalText;
    button.classList.remove('copied');
  }, 2000);
}
</script>
</body>
</html>
